server {
    listen 3006;
    server_name 31.97.63.174;

    location ^~ /static/ {
        alias /var/www/bec-production-frontend/build/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /static/admin/ {
        alias /var/www/bec-production/SchoolManagementBackend/CollegeManagement/staticfiles/admin/;
        expires 30d;
    }

    location ^~ /static/rest_framework/ {
        alias /var/www/bec-production/SchoolManagementBackend/CollegeManagement/staticfiles/rest_framework/;
        expires 30d;
    }

    location ^~ /static/drf-yasg/ {
        alias /var/www/bec-production/SchoolManagementBackend/CollegeManagement/staticfiles/drf-yasg/;
        expires 30d;
    }

    location / {
        root /var/www/bec-production-frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    location /backend-admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /admin/ {
        root /var/www/bec-production-frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /health/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $host:$server_port;
    }

    location /SWOSTITECH_CMS/ {
        alias /var/www/bec-production/SchoolManagementBackend/CollegeManagement/SWOSTITECH_CMS/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /swagger/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $host:$server_port;
    }

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 20M;
}
